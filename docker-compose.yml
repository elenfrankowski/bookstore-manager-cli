version: '3.8'

services:
  database:
    image: postgres:16-alpine
    container_name: sctec-bookstore-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: bookstore-db
    ports:
      - '5433:5432'
    volumes:
      - sctec-bookstore-postgres:/var/lib/postgresql/data
      - ./src/@common/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  sctec-bookstore-postgres:
